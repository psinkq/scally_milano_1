<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { box-shadow: 0 0 50px rgba(255,0,255,0.2); cursor: crosshair; }
    </style>
</head>
<body>
<script>
let img, anonFont;
let isImgLoaded = false, isFontLoaded = false;
let W, H;
let currentMode = 0;

const texts = [
    ["SCALLY MIL*NO", "ДАНИИЛ ВЛАДИСЛАВОВИЧ ДМИТРИЕВ", "critical_error", "ОН ЛЮБИТ ****, БРО", "**** ТИПА В ПОНЕДЕЛЬНИК", "ОНА ПАЛИТ НА МОЙ *****", "Я ГОТОВ ИЗМЕНИТЬ ВЕКТОР ТВОРЧЕСТВА", "ДАЙ МНЕ ШАНС", "ДАТА", "ВРЕМЯ"],
    ["Я НЕ ХОЖУ В ЗАЛ НО У МЕНЯ ЕСТЬ ПРЕСС БАБКИ", "МОИ ХЕЙТЕРЫ КАК СТАРЫЕ КРОССОВКИ ОНИ В ПРОШЛОМ", "Я ЗАШЕЛ В МАГАЗИН И КУПИЛ ВСЁ ЧТО НЕ МОГ ПОЗВОЛИТЬ", "ОНА ХОЧЕТ СО МНОЙ ФОТО Я ХОЧУ НОВЫЙ МЕРСЕДЕС", "Я ЛЕГЕНДА КАК БУДТО Я ИГРАЮ В MINECRAFT", "МОЙ КОШЕЛЕК ТАКОЙ ТОЛСТЫЙ ЧТО ЕМУ НУЖНА ДИЕТА", "Я НЕ ВРУ Я ПРОСТО ПРЕУВЕЛИЧИВАЮ РЕАЛЬНОСТЬ", "ДЕНЬГИ НЕ ЛЕЧАТ\nРАЗБИТОЕ СЕРДЦЕ\nНО НА НИХ МОЖНО\nКУПИТЬ ПЛАСТЫРЬ", "ДАТА", "ВРЕМЯ"],
    ["Я ЗАБРАЛ ТВОЮ П*ДРУГУ И ДАЖЕ НЕ ЗАМЕТИЛ", "МОИ КАРМАНЫ ТРЕЩАТ ПО ШВАМ", "ТЫ ВРЁШЬ В КАЖДОМ СВОЕМ ТР*КЕ", "Я ТРАЧУ ЭТИ ДЕНЬГИ КАК БУДТО ОНИ Б*МАГА", "ВСЕ ТВОИ ДРУЗЬЯ ХОТЯТ БЫТЬ КАК Я", "Я ЗАШЕЛ В КЛУБ И ВЫКУПИЛ ВЕСЬ Б*Р", "critical_error", "SYSTEM CORRUPTED", "ДАТА", "ВРЕМЯ"]
];

const allCoords = [
    [{x: 184, y: 70}, {x: 159, y: 114}, {x: 271, y: 175}, {x: 140, y: 237}, {x: 198, y: 285}, {x: 178, y: 300}, {x: 152, y: 360}, {x: 389, y: 404}, {x: 323, y: 736}, {x: 321, y: 751}],
    [{x: 477, y: 232}, {x: 189, y: 82}, {x: 147, y: 143}, {x: 196, y: 173}, {x: 142, y: 284}, {x: 182, y: 330}, {x: 146, y: 359}, {x: 227, y: 667}, {x: 328, y: 737}, {x: 328, y: 753}],
    [{x: 263, y: 173}, {x: 139, y: 206}, {x: 279, y: 222}, {x: 192, y: 300}, {x: 275, y: 237}, {x: 229, y: 345}, {x: 332, y: 373}, {x: 141, y: 405}, {x: 326, y: 734}, {x: 321, y: 752}]
];

let posterContent = [];

function preload() {
    img = loadImage('scally_mil.jpg', () => { isImgLoaded = true; });
    anonFont = loadFont('fonts/AnonymousPro-Bold.ttf', () => { isFontLoaded = true; });
}

function setup() {
    if (isImgLoaded) {
        let aspect = img.width / img.height;
        H = window.innerHeight * 0.95;
        W = H * aspect;
        createCanvas(W, H);
    }
    updateTextMode();
}

function updateTextMode() {
    let currentTexts = texts[currentMode];
    let currentCoords = allCoords[currentMode];
    posterContent = currentTexts.map((txt, i) => {
        let pos = currentCoords[i] || {x: W/2, y: H/2};
        return { txt: txt, origX: pos.x, origY: pos.y, currX: pos.x, currY: pos.y };
    });
}

function mousePressed() {
    currentMode = (currentMode + 1) % 3;
    updateTextMode();
    if (isImgLoaded) filter(INVERT);
}

function draw() {
    let mSpeed = dist(mouseX, mouseY, pmouseX, pmouseY);
    
    // Эффект шлейфа
    let bgAlpha = map(mSpeed, 0, 100, 255, 40, true);
    background(255, bgAlpha); 

    if (isImgLoaded) {
        let shift = map(mSpeed, 0, 100, 0, 25, true);
        if (mSpeed > 5) {
            push();
            tint(150, 255, 0, 180); // Салатовый
            image(img, random(-shift, shift), random(-shift, shift), width, height);
            tint(255, 0, 255, 180); // Розовый
            image(img, random(-shift, shift), random(-shift, shift), width, height);
            tint(0, 200, 255, 180); // Циан
            image(img, 0, 0, width, height);
            pop();
        } else {
            image(img, 0, 0, width, height);
        }
        if (mSpeed > 20 && random(10) > 6) filter(INVERT);
    }

    if (isFontLoaded) textFont(anonFont);
    else textFont('monospace');
    
    textSize(11); 
    textAlign(LEFT, CENTER);
    noStroke(); // На всякий случай отключаем обводки p5

    let tShift = map(mSpeed, 0, 100, 0, 5, true);

    for (let item of posterContent) {
        let intensity = map(mSpeed, 0, 100, 0, 120, true);
        
        if (mSpeed > 2) {
            item.currX += random(-intensity, intensity) * 0.4;
            item.currY += random(-intensity, intensity) * 0.4;
        }

        item.currX = lerp(item.currX, item.origX, 0.12);
        item.currY = lerp(item.currY, item.origY, 0.12);

        // УСЛОВИЕ ДЛЯ ЧИСТОТЫ: Если скорость маленькая — рисуем только 1 слой текста
        if (mSpeed > 2) {
            // Рисуем цветные слои только в движении
            fill(180, 255, 0); // Салатовый
            text(item.txt, item.currX + random(-tShift, tShift), item.currY + random(-tShift, tShift));
            
            fill(255, 0, 180); // Розовый
            text(item.txt, item.currX + random(-tShift, tShift), item.currY + random(-tShift, tShift));
            
            fill(mSpeed > 30 && random(10) > 8 ? 255 : 0); // Основной (инвертируемый)
            text(item.txt, item.currX, item.currY);
        } else {
            // МЫШЬ СТОИТ: Рисуем один чистый слой без смещения
            fill(0); 
            text(item.txt, item.origX, item.origY);
        }
    }

    if (mSpeed > 60) {
        stroke(random(1) > 0.5 ? color(255, 0, 255) : color(100, 255, 0), 180);
        strokeWeight(random(1, 4));
        line(0, random(height), width, random(height));
    }
}
</script>
</body>
</html>

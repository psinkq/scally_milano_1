<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
  <title>2</title>
  <style>
    @font-face {
      font-family: 'TVES-MINI';
      src: url('fonts/tves-mini.ttf') format('truetype');
    }
    @font-face {
      font-family: 'SHTRIX-MINI';
      src: url('fonts/SHTRIX-MINI.ttf') format('truetype');
    }
    @font-face {
      font-family: 'Mercury';
      src: url('fonts/mercury-130.ttf') format('truetype');
      font-weight: 300;
    }
    @font-face {
      font-family: 'Mercury';
      src: url('fonts/mercury-140.ttf') format('truetype');
      font-weight: 400;
    }
    @font-face {
      font-family: 'Minica';
      src: url('fonts/minica-1101-1.ttf') format('truetype');
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #080808;
      display: flex; justify-content: center; align-items: center;
      overflow: hidden;
    }
    #poster {
      position: relative;
      width: 390px;
      height: 844px;
      overflow: hidden;
      flex-shrink: 0;
    }
    @media (max-height: 860px) {
      #poster {
        height: 100vh;
        width: calc(100vh * 390 / 844);
      }
    }
    video {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
    }
    #sketch {
      position: absolute;
      inset: 0;
      z-index: 1;
    }
    #hint {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.25);
      font-size: 9px;
      font-family: 'Minica', monospace, sans-serif;
      letter-spacing: 3px;
      z-index: 2;
      pointer-events: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="poster">
    <video autoplay loop muted playsinline>
      <source src="vid.mp4" type="video/mp4">
    </video>
    <div id="sketch"></div>
    <div id="hint">CLICK TO PAUSE</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
  new p5(p => {

    // ── CONSTANTS ──────────────────────────────────────────────────────────
    const W = 390, H = 844;
    const PERSP = 680;
    const GLYPHS = '░▒▓█▄▀■□▪◆◇○●◉⌂⊕⊗⊙⚡⚠⚒⚙◣◢▶◀▲▼';

      const NEON = [
        [242, 0, 255],   // magenta
        [0, 255, 234],   // cyan
        [17, 255, 0],    // lime
        [18, 7, 169],    // deep blue
        [255, 228, 0],   // yellow
      ];

    // 8-bit acidic pairs {bg, fg} — opaque, high contrast
    const LABEL_PALETTES = [
      {bg:[0,0,0],       fg:[98,221,205]},      // black / blue
      {bg:[0,0,0],       fg:[38,183,212]},     // black / cyan
      {bg:[0,0,0],       fg:[176,91,183]},     // black / magenta
      {bg:[0,0,0],       fg:[203,203,129]},     // black / yellow
      {bg:[0,0,170],     fg:[255,255,85]},    // CGA blue / bright yellow
      {bg:[96,43,61],     fg:[255,255,255]},   // deep red / white
      {bg:[176,91,183],   fg:[0,0,0]},         // magenta / black
      {bg:[38,183,212],   fg:[0,0,0]},         // cyan / black
      {bg:[203,203,129],   fg:[0,0,0]},         // yellow / black
      {bg:[105,187,100],    fg:[0,0,0]},         // lime / black
      {bg:[85,0,170],    fg:[255,255,0]},     // purple / yellow
      {bg:[255,85,0],    fg:[0,0,0]},         // orange / black
    ];

    // lyrics:
const LABELS = [
  'Вау, вау, вау, йупи-йо, йупи-йей, ***',
  'Предъявите паспорт, зубы этой суки чаще видят ***',
  'Бро торчит на кухне три часа, но не готовит пасту',
  'Перед тем, как меряться со мной ***, посмотри на мой',
  'Если хочешь тоже в игру — тебе нужно задротить всё',
  'А ты настолько броук, будто в твоей стране безработица',
  'Включи музыку погромче, двигай телом',
  'Шоты, алкоголь, текила, детка, я куплю это',
  'Шорты от Vetements, ещё Amiri — я ношу это',
  'Я ощущаю себя боссом',
  'Дар красиво говорить был мне с неба послан',
  'Хейтер видит, что я поднимаюсь — ***',
  'Проснулся, сразу дал два *** — и я снова сонный',
  'Если ты мой опп, то советую те носить броник',
  'Мой язык острый, как будто я пихал его в точилку',
  'Мы самые старые здесь, как Оззи Осборн',
  'Я купил бабушке в аптеке таблетки',
  'У меня за зубами лежит грязь, и я не про кариес',
  'На телефоне обманываю людей день и ночь',
  'Дайте кто-нибудь счётчик, не могу посчитать банкноты',
  'Парень, у тебя пару методов, а у меня методов книга',
  'Ты не рэпуешь то, чем жил',
  'У меня bar\'ы как в центрах, я в них утону',
  'Я сплю на этих скучных челов',
  'Если бы я был другим, *** бы я поднял тесто'
];


    // ── STATE ──────────────────────────────────────────────────────────────
    let vpX = W / 2, vpY = H / 2;
    let targetVpX = vpX, targetVpY = vpY;
    let paused = false;
    let speed = 1.0;
    let wins = [];
    let glitchFlash = 0;

    // ── PROJECTION ─────────────────────────────────────────────────────────
    function project(ox, oy, z) {
      const z2 = Math.max(z, 1);
      const s = PERSP / (PERSP + z2);
      return { x: vpX + ox * s, y: vpY + oy * s, s };
    }

    // ── BASE WINDOW ────────────────────────────────────────────────────────
    class Win {
      constructor(zInit) {
        this._init(zInit != null ? zInit : p.random(1600, 2400));
      }

      _init(z) {
        this.z      = z;
        this.ox = p.random() > 0.5 ? p.random(-W * 1.5, -W * 0.3) : p.random(W * 0.3, W * 1.5);
        this.oy = p.random(-H, H);
        this.spd    = p.random(3.2, 8.5);
        this.bw     = p.random(200, 310);
        this.bh     = p.random(130, 240);
        this.accent = p.random(NEON);
        this.palette= p.random(LABEL_PALETTES);
        this.seed   = p.floor(p.random(99999));
        this.label  = p.random(LABELS);
        this.phase  = p.random(1000);
        this.tilt   = p.random(-0.028, 0.028);
      }

      get alpha() {
        if (this.z > 1800) return p.map(this.z, 2200, 1700, 0, 255);
        if (this.z < 140)  return p.map(this.z, 140, 0, 255, 0);
        return 255;
      }

      update() {
        if (!paused) {
          this.z -= this.spd * speed;
          this.phase += 0.045;
        }
        if (this.z < -70) this._init(p.random(1600, 2400));
      }

      draw() {
        const a = p.constrain(this.alpha, 0, 255);
        if (a < 3) return;
        const pr = project(this.ox, this.oy, this.z);
        if (pr.s < 0.04 || pr.s > 5.5) return;

        p.push();
        p.translate(pr.x, pr.y);
        p.scale(pr.s);
        p.rotate(this.tilt * p.map(pr.s, 0.1, 1.5, 1.4, 0));
        this.render(a);
        p.pop();
      }

      render(a) { /* override */ }

      // ── shared helpers ─────────────────────────────────────────────────
      _frame(w, h, title, a, dark = false) {
        const bg  = dark ? [16, 16, 22, a * 0.96] : [246, 246, 248, a * 0.92];
        const bdr = dark ? [70, 70, 90, a * 0.5]  : [190, 190, 194, a * 0.55];

        p.drawingContext.shadowColor = `rgba(0,0,0,${p.map(a, 0, 255, 0, 0.35)})`;
        p.drawingContext.shadowBlur  = 22;
        p.fill(...bg);
        p.stroke(...bdr);
        p.strokeWeight(1);
        p.rect(-w/2, -h/2, w, h, 8);
        p.drawingContext.shadowBlur = 0;

        const tbH = 30;
        const tbBg = dark ? [26, 26, 36, a] : [238, 238, 242, a];
        p.fill(...tbBg);
        p.noStroke();
        p.rect(-w/2, -h/2, w, tbH, 8, 8, 0, 0);

        // Win11 title (left-aligned)
        const fg = dark ? [200, 200, 200, a * 0.82] : [38, 38, 38, a * 0.82];
        p.fill(...fg);
        p.noStroke();
        p.textFont('Segoe UI, system-ui, Arial');
        p.textSize(11);
        p.textAlign(p.LEFT, p.CENTER);
        p.text(title, -w/2 + 12, -h/2 + tbH/2);

        // Win11 window controls — right side
        const btnY = -h/2 + tbH/2;
        // Minimize —
        p.fill(...fg);
        p.noStroke();
        p.textSize(14);
        p.textAlign(p.CENTER, p.CENTER);
        p.text('─', w/2 - 76, btnY + 2);
        // Maximize □
        p.noFill();
        p.stroke(...fg);
        p.strokeWeight(1);
        p.rect(w/2 - 61, btnY - 5, 10, 10);
        // Close ✕ (red bg)
        p.noStroke();
        p.fill(196, 43, 28, a * 0.9);
        p.rect(w/2 - 36, -h/2, 36, tbH, 0, 8, 0, 0);
        p.fill(255, 255, 255, a * 0.92);
        p.textSize(11);
        p.text('✕', w/2 - 18, btnY);

        // divider
        const div = dark ? `rgba(255,255,255,${a/255*0.07})` : `rgba(0,0,0,${a/255*0.09})`;
        p.drawingContext.strokeStyle = div;
        p.drawingContext.lineWidth = 1;
        p.drawingContext.beginPath();
        p.drawingContext.moveTo(-w/2, -h/2 + tbH);
        p.drawingContext.lineTo( w/2, -h/2 + tbH);
        p.drawingContext.stroke();

        return tbH;
      }

      _glitch(str) {
        let out = '';
        for (let i = 0; i < str.length; i++) {
          const n = p.noise(i * 0.38, this.phase * 0.7);
          if (n > 0.87 && p.frameCount % 5 < 2) {
            out += GLYPHS[p.floor(p.noise(i * 2, this.phase) * GLYPHS.length)];
          } else {
            out += str[i];
          }
        }
        return out;
      }

      // Split label into censored / uncensored segments
      _parseSegs(str) {
        const segs = [], re = /\{\{(.+?)\}\}/g;
        let last = 0, m;
        while ((m = re.exec(str)) !== null) {
          if (m.index > last) segs.push({text: str.slice(last, m.index), censored: false});
          segs.push({text: m[1], censored: true});
          last = m.index + m[0].length;
        }
        if (last < str.length) segs.push({text: str.slice(last), censored: false});
        return segs;
      }

      // Depth-aware typed glitch: far away = all noise chars, close = clean text typed in
      _typedGlitch(str) {
        // progress 0→1 as element travels from z=1400 to z=80
        const progress  = p.constrain(p.map(this.z, 1400, 80, 0, 1), 0, 1);
        // glitchRate 1→0 as element approaches (far = full noise, close = clean)
        const glitchRate = p.constrain(p.map(this.z, 900, 120, 1, 0), 0, 1);
        const revealed  = Math.ceil(progress * str.length);

        let out = '';
        for (let i = 0; i < str.length; i++) {
          if (i >= revealed) {
            // Not yet typed → show animated noise glyph
            out += GLYPHS[p.floor(p.noise(i * 1.7 + this.seed * 0.01, this.phase * 1.4) * GLYPHS.length)];
          } else {
            // Typed but may still be corrupted
            const n = p.noise(i * 0.38 + this.seed * 0.01, this.phase * 0.7);
            if (n < glitchRate * 0.28 || (p.frameCount % 5 < 2 && n > 0.83)) {
              out += GLYPHS[p.floor(p.noise(i * 2 + this.seed, this.phase) * GLYPHS.length)];
            } else {
              out += str[i];
            }
          }
        }
        return out;
      }
    }

    // ── START MENU ─────────────────────────────────────────────────────────
    class StartMenuWin extends Win {
      render(a) {
        const w = this.bw, h = this.bh;

        // frosted glass bg
        p.drawingContext.shadowColor = `rgba(0,0,0,${a/255*0.28})`;
        p.drawingContext.shadowBlur = 26;
        p.fill(243, 243, 245, a * 0.91);
        p.stroke(160, 160, 165, a * 0.4);
        p.strokeWeight(1);
        p.rect(-w/2, -h/2, w, h, 9);
        p.drawingContext.shadowBlur = 0;

        // search box
        p.fill(255, 255, 255, a * 0.92);
        p.stroke(0, 0, 0, a * 0.12);
        p.strokeWeight(1);
        p.rect(-w/2 + 14, -h/2 + 14, w - 28, 28, 4);
        p.fill(0, 0, 0, a * 0.42);
        p.noStroke();
        p.textFont('system-ui, Segoe UI');
        p.textSize(9.5);
        p.textAlign(p.LEFT, p.CENTER);
        p.text('⌕  Type here to search', -w/2 + 24, -h/2 + 28);

        // Pinned header
        p.fill(0, 0, 0, a * 0.85);
        p.textSize(10);
        p.textStyle(p.BOLD);
        p.textAlign(p.LEFT, p.BASELINE);
        p.text('Pinned', -w/2 + 14, -h/2 + 57);

        const allAppsX = w/2 - 44;
        p.fill(255, 255, 255, a * 0.7);
        p.stroke(0, 0, 0, a * 0.1);
        p.strokeWeight(1);
        p.rect(allAppsX - 20, -h/2 + 46, 40, 16, 3);
        p.fill(0, 0, 0, a * 0.7);
        p.noStroke();
        p.textSize(7);
        p.textStyle(p.NORMAL);
        p.textAlign(p.CENTER, p.CENTER);
        p.text('All apps', allAppsX, -h/2 + 54);

        // App grid 4×2
        const appData = [
          [[0,103,192], 'Edge'],   [[37,99,160],  'Word'],
          [[33,115,70],  'Excel'], [[0,120,215],   'Mail'],
          [[0,174,241],  'Store'], [[255,152,0],   'Photos'],
          [[255,213,0],  'Notes'], [[76,76,76],    'Settings'],
        ];
        const cols = 4;
        const cw = (w - 28) / cols, ch = 52;
        appData.forEach(([[r,g,b], name], i) => {
          const col = i % cols, row = p.floor(i / cols);
          const cx = -w/2 + 14 + cw * col + cw/2;
          const cy = -h/2 + 64 + ch * row;
          p.fill(r, g, b, a * 0.86);
          p.noStroke();
          p.rect(cx - 13, cy, 26, 26, 4);
          // icon symbol
          p.fill(255, 255, 255, a * 0.8);
          p.textSize(12);
          p.textAlign(p.CENTER, p.CENTER);
          p.text(name[0], cx, cy + 13);
          p.fill(0, 0, 0, a * 0.6);
          p.textSize(7.5);
          p.textAlign(p.CENTER, p.TOP);
          p.text(name, cx, cy + 30);
        });

        if (h > 190) {
          // divider
          p.stroke(0, 0, 0, a * 0.09);
          p.strokeWeight(1);
          const divY = -h/2 + 64 + 2*ch + 10;
          p.line(-w/2 + 14, divY, w/2 - 14, divY);

          p.fill(0, 0, 0, a * 0.85);
          p.noStroke();
          p.textSize(10);
          p.textStyle(p.BOLD);
          p.textAlign(p.LEFT, p.BASELINE);
          p.text('Recommended', -w/2 + 14, divY + 20);
          p.textStyle(p.NORMAL);

          [['Rental Agreement', '17m ago'], ['Logo Ideas', '12h ago']].forEach(([name, time], i) => {
            const fy = divY + 26 + i * 28;
            p.fill(0, 80, 200, a * 0.76);
            p.noStroke();
            p.rect(-w/2 + 14, fy, 20, 20, 2);
            p.fill(0, 0, 0, a * 0.75);
            p.textSize(9);
            p.textAlign(p.LEFT, p.CENTER);
            p.text(name, -w/2 + 40, fy + 7);
            p.fill(0, 0, 0, a * 0.42);
            p.textSize(8);
            p.text(time, -w/2 + 40, fy + 17);
          });
        }

        // footer divider
        p.stroke(0, 0, 0, a * 0.08);
        p.strokeWeight(1);
        p.line(-w/2, h/2 - 36, w/2, h/2 - 36);
        p.fill(0, 0, 0, a * 0.6);
        p.noStroke();
        p.textSize(9.5);
        p.textAlign(p.LEFT, p.CENTER);
        p.text('● Name', -w/2 + 14, h/2 - 18);
        p.textAlign(p.RIGHT, p.CENTER);
        p.text('⏻   ⚙', w/2 - 14, h/2 - 18);
      }
    }

    // ── EDGE BROWSER ───────────────────────────────────────────────────────
    class BrowserWin extends Win {
      render(a) {
        const w = this.bw, h = this.bh;

        p.drawingContext.shadowColor = `rgba(0,0,0,${a/255*0.3})`;
        p.drawingContext.shadowBlur = 20;
        p.fill(250, 250, 252, a * 0.95);
        p.stroke(200, 200, 205, a * 0.5);
        p.strokeWeight(1);
        p.rect(-w/2, -h/2, w, h, 7);
        p.drawingContext.shadowBlur = 0;

        // tab strip
        p.fill(242, 242, 245, a);
        p.noStroke();
        p.rect(-w/2, -h/2, w, 28, 7, 7, 0, 0);

        // active tab
        p.fill(255, 255, 255, a * 0.92);
        p.stroke(210, 210, 215, a * 0.5);
        p.strokeWeight(1);
        p.rect(-w/2 + 8, -h/2 + 4, 112, 24, 5, 5, 0, 0);
        p.fill(20, 20, 20, a * 0.8);
        p.noStroke();
        p.textFont('system-ui, Segoe UI');
        p.textSize(8.5);
        p.textAlign(p.LEFT, p.CENTER);
        p.text('fedotova', -w/2 + 14, -h/2 + 16);

        // close btn
        p.fill(196, 43, 28, a * 0.88);
        p.noStroke();
        p.rect(w/2 - 36, -h/2, 36, 28, 0, 7, 0, 0);
        p.fill(255, 255, 255, a * 0.85);
        p.textSize(11);
        p.textAlign(p.CENTER, p.CENTER);
        p.text('✕', w/2 - 18, -h/2 + 14);

        // toolbar
        const ty = -h/2 + 28;
        p.fill(248, 248, 251, a);
        p.stroke(215, 215, 218, a * 0.4);
        p.strokeWeight(1);
        p.rect(-w/2, ty, w, 34);

        // nav buttons
        p.fill(80, 80, 90, a * 0.75);
        p.noStroke();
        p.textSize(13);
        p.textAlign(p.CENTER, p.CENTER);
        p.text('←', -w/2 + 16, ty + 17);
        p.text('→', -w/2 + 32, ty + 17);
        p.fill(80, 80, 90, a * 0.45);
        p.text('→', -w/2 + 32, ty + 17);
        p.fill(80, 80, 90, a * 0.75);
        p.text('↻', -w/2 + 50, ty + 17);

        // address bar
        p.fill(255, 255, 255, a);
        p.stroke(0, 90, 215, a * 0.75);
        p.strokeWeight(1.5);
        p.rect(-w/2 + 66, ty + 6, w - 116, 22, 11);
        p.fill(20, 70, 175, a * 0.88);
        p.noStroke();
        p.textSize(9);
        p.textAlign(p.CENTER, p.CENTER);
        p.text('🔒 brixagency.com', -w/2 + 66 + (w - 116)/2, ty + 17);

        // extensions
        p.fill(90, 90, 100, a * 0.6);
        p.textSize(13);
        p.textAlign(p.CENTER, p.CENTER);
        p.text('…', w/2 - 16, ty + 17);

        // page content
        const py = ty + 34;
        const ph = h - py - h/2;
        p.fill(255, 255, 255, a * 0.97);
        p.noStroke();
        p.rect(-w/2, py, w, ph, 0, 0, 7, 7);

        // fake webpage
        p.fill(18, 18, 18, a * 0.9);
        p.textFont('Mercury, Georgia, serif');
        p.textSize(14);
        p.textStyle(p.BOLD);
        p.textAlign(p.LEFT, p.TOP);
        p.text('BRIX Agency', -w/2 + 14, py + 10);
        p.textStyle(p.NORMAL);
        p.textFont('system-ui');
        p.fill(90, 90, 90, a * 0.65);
        p.textSize(8);
        p.text('Digital Design Studio · 2024', -w/2 + 14, py + 28);

        // content bars
        [[0.95, 42], [0.65, 54], [0.8, 66]].forEach(([pct, off]) => {
          p.fill(220, 220, 226, a * 0.4);
          p.rect(-w/2 + 14, py + off, (w - 28) * pct, 7, 2);
        });

        // image placeholder
        p.fill(200, 200, 218, a * 0.28);
        p.rect(-w/2 + 14, py + 80, w - 28, ph - 90, 4);
        p.fill(180, 180, 200, a * 0.35);
        p.textSize(22);
        p.textAlign(p.CENTER, p.CENTER);
        p.text('⊞', 0, py + 80 + (ph - 90)/2);
      }
    }

    // ── NEON GLITCH LABEL (highlighter) ───────────────────────────────────
    class GlitchLabelWin extends Win {
      _drawHighlightLine(segs, x0, y0, fSize, lineH, bgCol, fgCol, revealedTotal, charOffset, a) {
        p.textSize(fSize);
        p.textAlign(p.LEFT, p.CENTER);
        let xc = x0, seen = charOffset;
        for (const seg of segs) {
          if (!seg.censored) {
            const vis = p.constrain(revealedTotal - seen, 0, seg.text.length);
            const txt = seg.text.substring(0, vis);
            // glitch visible chars
            const gr = p.constrain(p.map(this.z, 600, 80, 1, 0), 0, 1);
            let disp = '';
            for (let i = 0; i < txt.length; i++) {
              const n = p.noise(i * 0.4 + this.seed * 0.01, this.phase * 0.8);
              disp += (n < gr * 0.22 || (p.frameCount % 6 < 2 && n > 0.84))
                ? GLYPHS[p.floor(p.noise(i*2+this.seed, this.phase)*GLYPHS.length)]
                : txt[i];
            }
            const vW = p.textWidth(txt || 'x') * (txt.length ? 1 : 0);
            // opaque 8-bit expanding highlight rect
            if (vW > 0) {
              p.noStroke(); p.fill(...bgCol, a);
              p.rect(xc - 1, y0 - lineH/2, vW + 3, lineH);
            }
            p.fill(...fgCol, a); p.noStroke();
            p.text(disp, xc, y0);
            xc += p.textWidth(seg.text);
          } else {
            // censored — solid government redaction block
            const cW = p.textWidth('W') * seg.text.length * 0.88 + 8;
            if (revealedTotal > seen) {
              p.noStroke(); p.fill(8, 8, 8, a * 0.96);
              p.rect(xc - 1, y0 - lineH/2, cW + 2, lineH);
              // static noise flash inside block
              if (p.noise(this.seed + 31, this.phase * 3.5) > 0.7) {
                p.fill(255, 255, 255, a * 0.11);
                p.textSize(fSize * 0.55);
                const st = [0,1,2,3].map(() => GLYPHS[p.floor(p.random()*GLYPHS.length)]).join('');
                p.text(st, xc + 3, y0);
                p.textSize(fSize);
              }
              // РКН stamp
              p.fill(210, 20, 20, a * 0.88);
              p.textSize(6); p.textAlign(p.LEFT, p.TOP);
              p.text('РКН⊟', xc + 1, y0 - lineH/2 + 1);
              p.textSize(fSize); p.textAlign(p.LEFT, p.CENTER);
            }
            xc += cW + p.textWidth(' ');
          }
          seen += seg.text.length;
        }
      }

      render(a) {
        const {bg, fg} = this.palette;
        const w = this.bw * 1.1 + 20;
        const fSize = 22, lineH = fSize + 8;

        p.noStroke();
        p.textFont('TVES-MINI, monospace');
        p.textSize(fSize);

        const progress = p.constrain(p.map(this.z, 1400, 80, 0, 1), 0, 1);
        const segs1 = this._parseSegs(this.label);
        const rawLen1 = segs1.reduce((s, g) => s + g.text.length, 0);
        const revealed1 = Math.ceil(progress * rawLen1);

        this._drawHighlightLine(segs1, -w/2 + 12, 0, fSize, lineH, bg, fg, revealed1, 0, a);

        // second line — slightly staggered, uses palette with shifted fg/bg for contrast
        const label2 = LABELS[(LABELS.indexOf(this.label) + 4) % LABELS.length];
        const segs2 = this._parseSegs(label2);
        const rawLen2 = segs2.reduce((s, g) => s + g.text.length, 0);
        const prog2 = p.constrain(p.map(this.z, 1200, 60, 0, 1), 0, 1);
        const revealed2 = Math.ceil(prog2 * rawLen2);

        // swap palette for second line so it contrasts
        const bg2 = fg, fg2 = bg;
        p.textFont('SHTRIX-MINI, monospace');
        this._drawHighlightLine(segs2, -w/2 + 12, lineH + 4, 17, 17 + 8, bg2, fg2, revealed2, 0, a * 0.85);

        p.textFont('system-ui');
      }
    }

    // ── SETUP ─────────────────────────────────────────────────────────────
    // Weighted pool — censorship/label types appear most frequently
    const TYPES = [
      GlitchLabelWin, GlitchLabelWin, GlitchLabelWin, GlitchLabelWin,
      ShtrixLabelWin, ShtrixLabelWin, ShtrixLabelWin,
      BlockedPageWin, BlockedPageWin, BlockedPageWin,
      CensoredBrowserWin, CensoredBrowserWin, CensoredBrowserWin,
      BrowserWin, BrowserWin,
      BrokenWin, BrokenWin,
      TerminalWin, TerminalWin,
      NotifWin, NotifWin,
      ContextMenuWin, ContextMenuWin,
      SearchWin, SearchWin,
      StartMenuWin,
      FileExplorerWin,
      DialogWin,
      TaskbarWin,
      SettingsWin,
      WidgetBoardWin,
      ActionCenterWin,
    ];

    p.setup = function() {
      const cnv = p.createCanvas(W, H);
      cnv.style('position', 'absolute');
      cnv.style('top', '0');
      cnv.style('left', '0');
      cnv.style('background', 'transparent');
      p.pixelDensity(1);
      p.textFont('system-ui, Segoe UI, Arial');

      // Spread windows across different depths — start all far enough that
      // s is small and every element begins near the vanishing point (center)
      for (let i = 0; i < 40; i++) {
        const T  = TYPES[i % TYPES.length];
        const z  = p.map(i, 0, 1000, -1000, 100);
        wins.push(new T(z));
      }
    };

    p.draw = function() {
      p.clear();

      // Draw video as background directly via canvas context
      const vid = document.querySelector('video');
      if (vid && vid.readyState >= 2) {
        p.drawingContext.drawImage(vid, 0, 0, W, H);
      }

      // Lerp VP toward mouse (parallax)
      if (p.mouseX > 0 && p.mouseX < W) {
        targetVpX = p.map(p.mouseX, 0, W, W/2 - 18, W/2 + 18);
        targetVpY = p.map(p.mouseY, 0, H, H/2 - 22, H/2 + 22);
      }
      vpX = p.lerp(vpX, targetVpX, 0.05);
      vpY = p.lerp(vpY, targetVpY, 0.05);

      // Speed from mouse Y (top = fast, bottom = slow)
      if (!paused && p.mouseY > 0) {
        speed = p.constrain(p.map(p.mouseY, 0, H, 2.0, 0.4), 0.3, 2.8);
      }

      // Vignette
      const vg = p.drawingContext.createRadialGradient(W/2, H/2, 0, W/2, H/2, H * 0.75);
      vg.addColorStop(0, 'rgba(0,0,0,0)');
      vg.addColorStop(1, 'rgba(0,0,0,0.52)');
      p.drawingContext.fillStyle = vg;
      p.drawingContext.fillRect(0, 0, W, H);

      // Sort back→front
      wins.sort((a, b) => b.z - a.z);

      for (const w of wins) {
        w.update();
        w.draw();
      }

      // Scanlines
      p.drawingContext.strokeStyle = 'rgba(0,0,0,0.09)';
      p.drawingContext.lineWidth = 1;
      for (let y = 0; y < H; y += 3) {
        p.drawingContext.beginPath();
        p.drawingContext.moveTo(0, y);
        p.drawingContext.lineTo(W, y);
        p.drawingContext.stroke();
      }

      // Pause overlay
      if (paused) {
        p.fill(0, 0, 0, 140);
        p.noStroke();
        p.rect(0, 0, W, H);
        p.fill(242, 0, 255, 220);
        p.textFont('SHTRIX-MINI, monospace');
        p.textSize(28);
        p.textAlign(p.CENTER, p.CENTER);
        p.text('// PAUSED //', W/2, H/2);
        p.textFont('Minica, monospace');
        p.textSize(11);
        p.fill(255, 255, 255, 140);
        p.text('CLICK TO RESUME', W/2, H/2 + 36);
        p.textFont('system-ui');
      }
      p.blendMode(p.DIFFERENCE);
      p.noStroke();
      p.fill(255); // Белый цвет в режиме DIFFERENCE полностью инвертирует фон
      p.rect(0, 0, W, H) // Квадрат 100x100 по центру мыши
      p.blendMode(p.BLEND); // Возврат в обычный режим

      p.blendMode(p.DIFFERENCE);
      p.noStroke();
      p.fill(255); // Белый цвет в режиме DIFFERENCE полностью инвертирует фон
      p.rect(p.mouseX - 50, p.mouseY - 50, 175, 175); // Квадрат 100x100 по центру мыши
      p.blendMode(p.BLEND); // Возврат в обычный режим
    };

    p.mousePressed = function() {
      paused = !paused;
    };

    // Touch support
    p.touchStarted = function() {
      paused = !paused;
      return false;
    };

  }, 'sketch');
